name: 재배대 현황 자동 갱신

on:
  schedule:
    - cron: '0 8 * * *'  # 매일 17:00 KST (= 08:00 UTC)
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install gspread google-auth openpyxl

      - name: 서비스 계정 키 생성
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > service-account-key.json

      - name: 재배대 현황 추출
        run: python fetch_cultivation.py
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: service-account-key.json

      - name: 키 파일 삭제
        run: rm -f service-account-key.json

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bed_status.json
          git diff --staged --quiet || git commit -m "🌱 재배대 현황 자동 갱신 $(date +'%Y-%m-%d %H:%M KST')"
          git push

