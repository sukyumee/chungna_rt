name: 재배대 현황 자동 갱신

on:
  schedule:
    # 매일 08:00 UTC = 17:00 KST
    - cron: '0 8 * * *'
  # 수동 실행도 가능
  workflow_dispatch:

jobs:
  fetch-cultivation:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 레포 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          pip install gspread google-auth openpyxl

      - name: 🔑 서비스 계정 키 파일 생성
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > service-account-key.json

      - name: 🌱 재배대 현황 추출
        run: |
          python fetch_cultivation.py
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: service-account-key.json

      - name: 🗑️ 키 파일 삭제 (보안)
        run: rm -f service-account-key.json

      - name: 📊 변경 확인
        id: check_changes
        run: |
          if git diff --quiet bed_status.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 💾 bed_status.json 커밋 & 푸시
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bed_status.json
          git commit -m "🌱 재배대 현황 자동 갱신 $(date +'%Y-%m-%d %H:%M KST')"
          git push
